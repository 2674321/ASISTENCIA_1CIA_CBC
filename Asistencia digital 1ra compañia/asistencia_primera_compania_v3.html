<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#c0392b"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="../img-logo-1cia.jpg"/>
  <title>Asistencia – Primera Compañía Bomba Chile</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&family=Source+Sans+3:wght@400;600&display=swap');

    :root {
      --rojo:  #c0392b;
      --azul:  #1a2a6c;
      --gris:  #2c2c2c;
      --linea: #999;
      --borde: #ccc;
      --check: 11px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 11px;
      color: var(--gris);
      background: #c8c8c8;
    }

    /* ── Página ── */
    .page {
      max-width: 210mm;
      min-height: 297mm;
      background: #fff;
      margin: 18px auto;
      padding: 5mm 6mm 6mm;
      box-shadow: 0 6px 28px rgba(0,0,0,.22);
      display: flex;
      flex-direction: column;
    }
    .page-content { flex: 1; }
    .page-footer { margin-top: auto; }

    /* ── Cabecera ── */
    .header {
      display: grid;
      grid-template-columns: 64px 1fr 64px;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .logo-img { width: 64px; height: 64px; object-fit: contain; }
    .header-center {
      border: 1.5px solid var(--gris);
      text-align: center;
      padding: 5px 10px;
    }
    .header-center p { font-size: 11px; line-height: 1.6; }

    /* ── Banda tricolor ── */
    .banda {
      height: 4px;
      background: linear-gradient(90deg, var(--azul) 0%, var(--rojo) 50%, var(--azul) 100%);
      margin: 5px 0 6px;
      border-radius: 2px;
    }

    /* ── Título ── */
    .titulo {
      font-family: 'EB Garamond', serif;
      font-size: 17px; font-weight: 700;
      text-align: center;
      letter-spacing: .4px;
      margin-bottom: 6px;
    }

    /* ── Campos editables ── */
    .campos-top { display: flex; gap: 12px; margin-bottom: 2px; flex-wrap: wrap; }
    .campos-bot { display: flex; gap: 12px; margin-bottom: 6px; flex-wrap: wrap; }
    .campo { display: flex; align-items: flex-end; gap: 4px; flex: 1; min-width: 80px; }
    .campo label { font-weight: 600; white-space: nowrap; font-size: 10px; }

    .campo input[type="text"], .campo input[type="date"] {
      flex: 1;
      border: none;
      border-bottom: 1px solid var(--linea);
      outline: none;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 10px;
      color: var(--gris);
      background: transparent;
      padding: 1px 2px;
      min-width: 28px;
      height: 16px;
    }
    .campo select {
      font-size: 10px;
      font-family: 'Source Sans 3', sans-serif;
      color: var(--gris);
      background: #fff;
      border: none;
      border-bottom: 1px solid var(--linea);
      outline: none;
      padding: 1px 2px;
      min-width: 60px;
      cursor: pointer;
    }
    .campo input[type="text"]:focus, .campo input[type="date"]:focus, .campo select:focus {
      border-bottom: 1.5px solid var(--azul);
      background: #f0f4ff;
    }

    /* ── Sección título ── */
    .seccion-titulo {
      font-family: 'EB Garamond', serif;
      font-size: 12px; font-weight: 700;
      text-align: center;
      margin-bottom: 5px;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* ── Grilla 4 columnas ── */
    .grilla {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 0 10px;
      margin-bottom: 7px;
    }
    .columna { display: flex; flex-direction: column; }
    .col-titulo {
      font-weight: 700; font-size: 9.5px;
      color: var(--rojo);
      border-bottom: 1.5px solid var(--rojo);
      padding-bottom: 2px; margin-bottom: 2px;
    }
    .subtitulo {
      font-weight: 700; font-size: 9px;
      color: var(--rojo);
      margin-top: 4px; margin-bottom: 2px;
    }
    .subtitulo-cont {
      font-weight: 700; font-size: 9px;
      color: var(--azul);
      border-bottom: 1px solid #ddd;
      padding-bottom: 2px; margin-bottom: 2px;
    }

    /* ── Fila integrante ── */
    .fila {
      display: flex; align-items: center;
      gap: 4px; padding: 3px 0;
      border-bottom: .5px solid #efefef;
    }
    .fila:last-child { border-bottom: none; }
    .nombre { font-size: 9.5px; line-height: 1.2; }

    /* ── Marcador clicable (div) ── */
    .fila .cb {
      width: var(--check); height: var(--check);
      border: 1px solid var(--gris);
      flex-shrink: 0;
      cursor: pointer;
      background: white;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 900;
      font-family: 'Source Sans 3', sans-serif;
      color: var(--gris);
      line-height: 1;
    }
    .fila .cb.asiste {
      color: var(--gris);
      border-color: var(--gris);
    }
    .fila .cb.permiso {
      color: var(--rojo);
      border-color: var(--rojo);
    }

    /* ── Totales ── */
    .totales-area {
      border-top: 1.5px solid var(--gris);
      margin-top: 5px; padding-top: 5px;
      display: flex; align-items: center; gap: 28px; flex-wrap: wrap;
    }
    .totales-box .tit { font-weight: 700; font-size: 10px; margin-bottom: 2px; }
    .fila-total { display: flex; align-items: center; gap: 6px; font-size: 10px; padding: 2px 0; }
    .total-num {
      display: inline-block;
      min-width: 22px; height: 14px;
      border: 1px solid var(--gris);
      font-size: 10px; font-weight: 700;
      text-align: center; line-height: 14px;
      background: white;
    }

    /* ── Select OBAC ── */
    select.obac-select {
      border: none; border-bottom: 1px solid var(--linea);
      outline: none; font-family: 'Source Sans 3', sans-serif;
      font-size: 10px; color: var(--gris); background: #fff;
      padding: 1px 2px; min-width: 130px; cursor: pointer;
    }
    select.obac-select:focus { border-bottom: 1.5px solid var(--azul); background: #f0f4ff; }
    select.obac-select option { background: #fff; color: var(--gris); font-size: 10px; }

    /* ── Modal firma ── */
    .modal-overlay {
      position: fixed; z-index: 999;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.35);
      display: flex; align-items: center; justify-content: center;
    }
    .modal-box {
      background: #fff; border-radius: 10px;
      padding: 20px 16px 16px; text-align: center;
      width: 320px; max-width: 90vw;
      box-shadow: 0 4px 24px rgba(0,0,0,0.25);
    }
    .modal-tit { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
    .modal-sub { font-size: 11px; color: #c0392b; margin-bottom: 10px; font-weight: 600; }
    #canvas-firma-draw {
      display: block; margin: 0 auto;
      width: 300px; height: 150px;
      border: 1px solid #aaa; border-radius: 6px;
      background: #fff; touch-action: none;
    }
    .modal-botones { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
    .modal-botones .btn { font-size: 12px; padding: 5px 18px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; }
    .btn-reset { background: #e0e0e0; color: #333; }
    .btn-excel { background: #c0392b; color: #fff; }

    /* ── Firma ── */
    .firma-area {
      display: flex; flex-direction: column;
      align-items: center; margin-top: 6px;
    }
    .firma-linea { width: 160px; border-top: 1px solid var(--gris); margin-bottom: 2px; }
    .firma-label { font-size: 9px; font-weight: 600; }

    /* ── Leyenda ── */
    .leyenda {
      display: flex; gap: 20px;
      margin-top: 5px; font-size: 8.5px; color: #555;
      border-top: 1px solid var(--borde); padding-top: 4px;
    }

    /* ── Botones ── */
    .toolbar {
      text-align: center; padding: 10px 0;
      display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
    }
    .btn {
      border: none; padding: 8px 22px;
      border-radius: 5px; font-size: 13px;
      cursor: pointer; font-family: sans-serif;
    }
    .btn-print { background: var(--rojo); color: #fff; }
    .btn-reset { background: var(--azul); color: #fff; }
    .btn-excel { background: #1d6f42; color: #fff; }
    .btn:hover { opacity: .85; }

    /* ══════════════════════════
       RESPONSIVE
    ══════════════════════════ */
    @media screen and (max-width: 820px) {
      .page { padding: 6mm 6mm 8mm; margin: 10px auto; }
      .grilla { grid-template-columns: 1fr 1fr; gap: 0 10px; }
      .header { grid-template-columns: 46px 1fr 46px; }
      .logo-img { width: 46px; height: 46px; }
      .titulo { font-size: 17px; }
      .header-center p { font-size: 10px; }
    }

    @media screen and (max-width: 540px) {
      body { background: #fff; }
      .page { padding: 4mm 4mm 6mm; margin: 0; box-shadow: none; min-height: 100vh; }
      .grilla { grid-template-columns: 1fr; gap: 0; }
      .header { grid-template-columns: 40px 1fr 40px; gap: 6px; }
      .logo-img { width: 40px; height: 40px; }
      .titulo { font-size: 15px; }
      .header-center p { font-size: 8.5px; }
      .campos-top, .campos-bot { flex-direction: column; gap: 6px; }
      .campo { min-width: auto; }
      .col-titulo { font-size: 10px; }
      .nombre { font-size: 9px; }
      .fila .cb { width: 16px; height: 16px; font-size: 11px; }
      .totales-area { gap: 16px; }
    }

    /* ══════════════════════════
       ESTILOS DE IMPRESIÓN
    ══════════════════════════ */
    @media print {
      @page { margin: 0; size: A4; }
      body { background: white; }
      .page {
        display: block; width: auto; max-width: none;
        margin: 0; box-shadow: none;
        min-height: 0; height: auto;
        padding: 4mm 6mm 16mm;
      }
      .page-content { display: block; }
      .page-footer {
        position: fixed; bottom: 2mm; left: 6mm; right: 6mm;
        background: white; margin-top: 0;
      }
      .no-print { display: none !important; }
      .grilla { gap: 0 6px; }

    .campo input[type="text"], .campo input[type="date"], .campo select {
        border-bottom: 1px solid #999 !important;
        background: transparent !important;
      }

      .fila .cb {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .total-num {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }
  </style>
</head>
<body>

<!-- Barra de herramientas (solo en pantalla) -->
<div class="toolbar no-print">
  <button class="btn btn-reset" onclick="resetForm()">↺ Limpiar todo</button>
  <button class="btn btn-excel" onclick="exportToExcel()">📊 Exportar Excel</button>
  <button class="btn btn-print" onclick="imprimir()">🖨️ Imprimir / Guardar PDF</button>
</div>

<div class="page">

  <div class="page-content">

  <!-- CABECERA -->
  <div class="header">
    <img class="logo-img" src="../Recursos%20graficos_softw/LOGO%20CBC.webp"/>
    <div class="header-center">
      <p><strong>Ayudantía General Cuerpo de Bomberos de Coquimbo</strong></p>
      <p>Registro de Asistencia a Actos de Servicio</p>
    </div>
    <img class="logo-img" src="../Recursos%20graficos_softw/img-logo-1cia-sin-fondo.png"/>
  </div>

  <div class="banda"></div>
  <div class="titulo">Primera Compañía – Bomba Chile</div>

  <!-- CAMPOS -->
  <div class="campos-top">
    <div class="campo"><label>Acto:</label><select id="acto"><option value="">—</option><option value="10-0 (Incendio estructural)">10-0 (Incendio estructural)</option><option value="10-4 (Rescate vehicular)">10-4 (Rescate vehicular)</option></select></div>
    <div class="campo"><label>Correlativo:</label><input type="text" id="corr" placeholder="______"/></div>
    <div class="campo"><label>Unidad:</label><input type="text" id="unidad" list="unidad-list" placeholder="J-1, RX-1, B-1…"/><datalist id="unidad-list"><option value="J-1"><option value="RX-1"><option value="B-1"></datalist></div>
    <div class="campo"><label>Fecha:</label><input type="date" id="fecha"/></div>
  </div>
  <div class="campos-bot">
    <div class="campo" style="flex:3"><label>Dirección:</label><input type="text" id="dir" placeholder="____________________________"/></div>
    <div class="campo" style="flex:1"><label>OBAC:</label><select class="obac-select" id="obac"><option value="">—</option></select></div>
  </div>

  <!-- ASISTENCIA -->
  <div class="seccion-titulo">Asistencia</div>

  <div id="asistencia-container">
    <p style="text-align:center;font-size:12px;padding:12px">Cargando listado de voluntarios…</p>
  </div>

  </div><!-- /page-content -->

  <div class="page-footer">

  <!-- TOTALES -->
  <div class="totales-area">
    <div class="totales-box">
      <div class="tit">Total</div>
      <div class="fila-total">
        <span class="total-num" id="num-asistentes">0</span>
        <span>Asistentes</span>
      </div>
      <div class="fila-total">
        <span class="total-num" id="num-permisos">0</span>
        <span>Permisos</span>
      </div>
    </div>
    </div>

  <!-- FIRMA -->
  <div class="firma-area">
    <div class="firma-linea"></div>
    <div class="firma-label" id="firma-label" style="cursor:pointer">Firma OBAC</div>
  </div>

  <!-- Modal firma digital -->
  <div id="firma-modal" class="modal-overlay no-print" style="display:none">
    <div class="modal-box">
      <div class="modal-tit">Firma digital</div>
      <div class="modal-sub" id="modal-obac-name"></div>
      <canvas id="canvas-firma-draw" width="300" height="150"></canvas>
      <div class="modal-botones">
        <button class="btn btn-reset" onclick="limpiarCanvasFirma()">Limpiar</button>
        <button class="btn btn-excel" onclick="aceptarFirma()">Aceptar</button>
      </div>
    </div>
  </div>

  <!-- LEYENDA -->
  <div class="leyenda">
    <span><strong>X</strong>: Asiste</span>
    <span><strong>P</strong>: Permiso</span>
  </div>

  </div><!-- /page-footer -->

</div><!-- /page -->

<script>
  let voluntarios = [];

  function cargarVoluntarios() {
    const container = document.getElementById('asistencia-container');
    container.innerHTML = '<p style="text-align:center;font-size:12px;padding:12px">Cargando listado…</p>';

    fetch('voluntarios.json?_=' + Date.now())
      .then(function(r) { if (!r.ok) throw new Error('Error al cargar voluntarios.json'); return r.json(); })
      .then(function(data) {
        voluntarios = data.filter(function(v) { return v.activo === true; });
        renderizarAsistencia();
        llenarObacList();
      })
      .catch(function(err) {
        container.innerHTML = '<p style="text-align:center;font-size:12px;padding:12px;color:#c0392b">Error al cargar listado de voluntarios.</p>';
        console.error(err);
      });
  }

  function renderizarAsistencia() {
    const oficiales = voluntarios.filter(function(v) { return v.seccion === 'oficialidad'; });
    const mmhh = voluntarios.filter(function(v) { return v.cargo === 'M.M.H.H.'; });
    const voluntas = voluntarios.filter(function(v) { return v.seccion === 'voluntarios' && v.cargo !== 'M.M.H.H.'; });
    const aspirantes = voluntarios.filter(function(v) { return v.seccion === 'aspirantes'; });

    const container = document.getElementById('asistencia-container');
    container.innerHTML = '';

    const grilla = document.createElement('div'); grilla.className = 'grilla';

    // Col 1: Oficiales - título "Oficialidad", luego sueltos y subsecciones
    const sueltos = oficiales.filter(function(p) { return !p.subseccion || p.subseccion === ''; });
    const gruposOficiales = [];
    gruposOficiales.push({ titulo: 'Oficialidad', clase: 'col-titulo', personas: sueltos });
    ['operativa', 'administrativa'].forEach(function(s) {
      const personas = oficiales.filter(function(p) { return (p.subseccion || '') === s; });
      if (personas.length > 0) {
        gruposOficiales.push({ titulo: s.charAt(0).toUpperCase() + s.slice(1), clase: 'subtitulo', personas: personas });
      }
    });
    grilla.appendChild(crearColumna(gruposOficiales));

    // Col 2: M.M.H.H.
    grilla.appendChild(crearColumna([
      { titulo: 'M.M.H.H.', clase: 'col-titulo', personas: mmhh },
    ]));

    // Col 3: Voluntarios (primera mitad)
    const mitad = Math.ceil(voluntas.length / 2);
    grilla.appendChild(crearColumna([
      { titulo: 'Voluntarios', clase: 'col-titulo', personas: voluntas.slice(0, mitad) },
    ]));

    // Col 4: Voluntarios (segunda mitad) + Aspirantes
    const gruposCol4 = [
      { titulo: 'Voluntarios', clase: 'col-titulo', personas: voluntas.slice(mitad) },
    ];
    if (aspirantes.length > 0) {
      gruposCol4.push({ titulo: 'Aspirantes', clase: 'col-titulo', personas: aspirantes });
    }
    grilla.appendChild(crearColumna(gruposCol4));

    container.appendChild(grilla);
    actualizarTotales();
  }

  function crearColumna(grupos) {
    const col = document.createElement('div'); col.className = 'columna';
    grupos.forEach(function(g) {
      if (g.titulo) {
        const tit = document.createElement('div');
        tit.className = g.clase || 'col-titulo';
        tit.textContent = g.titulo;
        col.appendChild(tit);
      }
      g.personas.forEach(function(p) {
        const fila = document.createElement('div'); fila.className = 'fila';
        const cb = document.createElement('div'); cb.className = 'cb'; cb.dataset.estado = '0';
        const nom = document.createElement('span'); nom.className = 'nombre';
        if (p.cargo && p.cargo !== 'Voluntario') {
          nom.innerHTML = '<strong>' + p.cargo + '</strong> - ' + p.nombre;
        } else {
          nom.textContent = p.nombre;
        }
        fila.appendChild(cb);
        fila.appendChild(nom);
        col.appendChild(fila);
      });
    });
    return col;
  }

  function llenarObacList() {
    const sel = document.getElementById('obac');
    sel.innerHTML = '<option value="">—</option>';
    voluntarios.forEach(function(v) {
      const opt = document.createElement('option');
      opt.value = v.nombre;
      opt.textContent = v.nombre;
      sel.appendChild(opt);
    });
  }

  /* ── Firma digital manual (canvas dibujable) ── */
  var canvasDraw = null, ctxDraw = null;
  var drawing = false;

  function abrirPanelFirma() {
    var sel = document.getElementById('obac');
    var nombre = sel.value;
    if (!nombre) { alert('Seleccione un OBAC primero.'); return; }
    document.getElementById('modal-obac-name').textContent = nombre;
    document.getElementById('firma-modal').style.display = 'flex';
    canvasDraw = document.getElementById('canvas-firma-draw');
    ctxDraw = canvasDraw.getContext('2d');
    ctxDraw.fillStyle = '#fff';
    ctxDraw.fillRect(0, 0, canvasDraw.width, canvasDraw.height);
    ctxDraw.lineWidth = 2;
    ctxDraw.lineCap = 'round';
    ctxDraw.strokeStyle = '#1a2a6c';
  }

  function cerrarPanelFirma() {
    document.getElementById('firma-modal').style.display = 'none';
    canvasDraw = ctxDraw = null;
  }

  function limpiarCanvasFirma() {
    if (!ctxDraw || !canvasDraw) return;
    ctxDraw.fillStyle = '#fff';
    ctxDraw.fillRect(0, 0, canvasDraw.width, canvasDraw.height);
  }

  function aceptarFirma() {
    cerrarPanelFirma();
  }

  function iniciarDibujo(e) {
    if (!ctxDraw) return;
    drawing = true;
    var pos = obtenerPos(e);
    ctxDraw.beginPath();
    ctxDraw.moveTo(pos.x, pos.y);
    e.preventDefault();
  }

  function dibujar(e) {
    if (!drawing || !ctxDraw) return;
    var pos = obtenerPos(e);
    ctxDraw.lineTo(pos.x, pos.y);
    ctxDraw.stroke();
    e.preventDefault();
  }

  function detenerDibujo() {
    drawing = false;
  }

  function obtenerPos(e) {
    var rect = canvasDraw.getBoundingClientRect();
    var x, y;
    if (e.touches) {
      x = (e.touches[0].clientX - rect.left) * (canvasDraw.width / rect.width);
      y = (e.touches[0].clientY - rect.top) * (canvasDraw.height / rect.height);
    } else {
      x = (e.clientX - rect.left) * (canvasDraw.width / rect.width);
      y = (e.clientY - rect.top) * (canvasDraw.height / rect.height);
    }
    return { x: x, y: y };
  }

  document.addEventListener('DOMContentLoaded', function() {
    cargarVoluntarios();

    let fecha = document.getElementById('fecha');
    if (fecha) fecha.value = new Date().toISOString().split('T')[0];

    document.querySelector('.page').addEventListener('click', function(e) {
      let cb = e.target.closest('.cb');
      if (!cb) return;

      let estado = parseInt(cb.dataset.estado || '0');
      if (estado === 0) {
        estado = 1;
        cb.textContent = 'X';
        cb.classList.add('asiste');
        cb.classList.remove('permiso');
      } else if (estado === 1) {
        estado = 2;
        cb.textContent = 'P';
        cb.classList.remove('asiste');
        cb.classList.add('permiso');
      } else {
        estado = 0;
        cb.textContent = '';
        cb.classList.remove('asiste', 'permiso');
      }
      cb.dataset.estado = estado;
      actualizarTotales();
    });

    document.getElementById('firma-label').addEventListener('click', abrirPanelFirma);

    // Eventos del canvas modal
    document.addEventListener('mousedown', function(e) {
      if (e.target && e.target.id === 'canvas-firma-draw') iniciarDibujo(e);
    });
    document.addEventListener('mousemove', dibujar);
    document.addEventListener('mouseup', detenerDibujo);
    document.addEventListener('touchstart', function(e) {
      if (e.target && e.target.id === 'canvas-firma-draw') iniciarDibujo(e);
    }, {passive: false});
    document.addEventListener('touchmove', dibujar, {passive: false});
    document.addEventListener('touchend', detenerDibujo);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(function(reg) {
        if (reg.waiting) location.reload();
        reg.onupdatefound = function() {
          var installing = reg.installing;
          if (installing) installing.onstatechange = function() {
            if (installing.state === 'installed' && navigator.serviceWorker.controller) {
              location.reload();
            }
          };
        };
      });
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        location.reload();
      });
    }
  });

  function nombreArchivo() {
    let a = document.getElementById('acto').value || 'sin_acto';
    let u = document.getElementById('unidad').value || 'sin_unidad';
    let f = document.getElementById('fecha').value || 'sin_fecha';
    a = a.replace(/[^a-zA-Z0-9-]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, '');
    u = u.replace(/[^a-zA-Z0-9-]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, '');
    return 'asistencia_' + f + '_' + u + '_' + a;
  }

  function actualizarTotales() {
    let asistentes = 0, permisos = 0;
    document.querySelectorAll('.cb').forEach(function(cb) {
      let e = parseInt(cb.dataset.estado || '0');
      if (e === 1) asistentes++;
      if (e === 2) permisos++;
    });
    document.getElementById('num-asistentes').textContent = asistentes;
    document.getElementById('num-permisos').textContent = permisos;
  }

  function imprimir() {
    document.title = nombreArchivo();
    window.print();
  }

  function resetForm() {
    if (!confirm('¿Limpiar todos los datos del formulario?')) return;
    document.querySelectorAll('.cb').forEach(function(cb) {
      cb.dataset.estado = '0';
      cb.textContent = '';
      cb.classList.remove('asiste', 'permiso');
    });
    document.querySelectorAll('input').forEach(function(i) { i.value = ''; });
    document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
    actualizarTotales();
  }

  function exportToExcel() {
    let datos = [];
    let acto = document.getElementById('acto').value || '(sin especificar)';
    let fecha = document.getElementById('fecha').value || '(sin fecha)';
    let unidad = document.getElementById('unidad').value || '(sin unidad)';

    datos.push(['Registro de Asistencia - Primera Compañía Bomba Chile']);
    datos.push(['Acto:', acto, 'Unidad:', unidad, 'Fecha:', fecha]);
    datos.push([]);
    datos.push(['N°', 'Nombre', 'Cargo/Grupo', 'Asistencia']);

    let idx = 1;
    document.querySelectorAll('.fila').forEach(function(fila) {
      let nombre = fila.querySelector('.nombre');
      if (!nombre) return;
      let cb = fila.querySelector('.cb');
      let estado = cb ? parseInt(cb.dataset.estado || '0') : 0;
      let texto = estado === 1 ? 'Asiste' : estado === 2 ? 'Permiso' : 'Ausente';

      let grupo = '';
      let col = fila.closest('.columna');
      if (col) {
        let tit = col.querySelector('.col-titulo');
        if (tit) grupo = tit.textContent;
        else {
          let sub = col.querySelector('.subtitulo') || col.querySelector('.subtitulo-cont');
          if (sub) grupo = sub.textContent;
        }
      }

      datos.push([idx++, nombre.textContent.trim(), grupo, texto]);
    });

    datos.push([]);
    let asistentes = document.getElementById('num-asistentes').textContent;
    let permisos = document.getElementById('num-permisos').textContent;
    datos.push(['Total Asistentes:', asistentes]);
    datos.push(['Total Permisos:', permisos]);

    let html = '<table>';
    datos.forEach(function(fila) {
      html += '<tr>';
      fila.forEach(function(celda) {
        html += '<td>' + String(celda).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</td>';
      });
      html += '</tr>';
    });
    html += '</table>';

    let blob = new Blob(['\ufeff' + html], { type: 'application/vnd.ms-excel' });
    let url = URL.createObjectURL(blob);
    let a = document.createElement('a');
    a.href = url;
    a.download = nombreArchivo() + '.xls';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
</script>

</body>
